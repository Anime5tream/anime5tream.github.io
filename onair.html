</div>
<div class="toast-box" id="toast-box"></div>

<script src="common.js"></script>
<script>
async function loadOnAir(){
  const grid=document.getElementById('oa-grid');
  grid.innerHTML='<div class="load" style="grid-column:1/-1"><div class="spin"></div></div>';
  const d=await req('/anime/tioanime/filter?status=1&sort=recent');
  const items=(d&&Array.isArray(d.results))?d.results:[];
  if(!items.length){grid.innerHTML='<div style="color:var(--text3);font-size:13px;grid-column:1/-1;padding:20px 0">No se pudo cargar.</div>';return;}
  grid.innerHTML=items.map(a=>animeCard(a)).join('');
}
loadOnAir();
</script>

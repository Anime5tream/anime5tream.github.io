<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi perfil · AnimeStream</title>
  <meta name="description" content="Una pagina para ver anime sin anuncios :D">
  <meta property="og:title" content="AnimeStream">
  <meta property="og:description" content="Una pagina para ver anime sin anuncios :D">
  <meta property="og:image" content="https://i.imgur.com/ZkZavVo.png">
  <meta property="og:url" content="https://anime5tream.github.io/profile.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AnimeStream">
  <meta name="twitter:description" content="Una pagina para ver anime sin anuncios :D">
  <meta name="twitter:image" content="https://i.imgur.com/ZkZavVo.png">
  <link rel="icon" type="image/png" href="https://i.imgur.com/ZkZavVo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <div id="app">
    <aside id="sidebar">
      <a class="s-logo" href="index.html">
        <div class="s-logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white"
            stroke-width="2">
            <polygon points="5,3 19,12 5,21" />
          </svg></div>
        <div class="s-logo-text">Anime<span>Stream</span></div>
      </a>
      <nav class="s-nav">
        <div class="s-section">Principal</div>
        <a class="s-item" href="index.html"><svg class="s-icon" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9,22 9,12 15,12 15,22" />
          </svg>Inicio</a>
        <a class="s-item" href="explore.html"><svg class="s-icon" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>Explorar</a>
        <a class="s-item" href="onair.html"><svg class="s-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="2" />
            <path
              d="M6.34 6.34a8 8 0 000 11.32M17.66 6.34a8 8 0 010 11.32M3.76 3.76a12 12 0 000 16.48M20.24 3.76a12 12 0 010 16.48" />
          </svg>En emision</a>
        <a class="s-item" href="favorites.html"><svg class="s-icon" viewBox="0 0 24 24">
            <path
              d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
          </svg>Favoritos</a>
        <a class="s-item" href="history.html"><svg class="s-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12,6 12,12 16,14" />
          </svg>Historial</a>
        <a class="s-item active" href="profile.html"><svg class="s-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 21v-1a8 8 0 0116 0v1" />
          </svg>Perfil</a>

      </nav>
      <div class="s-bottom">
        <a class="s-profile" href="profile.html">
          <div class="s-ava" id="sb-ava"><span id="sb-ini">?</span></div>
          <div>
            <div class="s-pname" id="sb-uname">Mi perfil</div>
            <div class="s-prole" id="sb-role">Recien llegado</div>
          </div>
        </a>
      </div>
    </aside>
    <div id="sb-ov"></div>

    <main id="main">
      <header id="topbar">
        <button class="menu-btn" onclick="toggleSb()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="search-input" type="text" placeholder="Buscar anime..." autocomplete="off">
          <div class="search-drop" id="sdrop"></div>
        </div>
        <div class="t-right">
          <a class="t-btn" href="favorites.html" title="Favoritos">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path
                d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
            </svg>
          </a>
          <a class="t-btn-avatar" id="topbar-avatar" href="profile.html"><span id="topbar-ini">?</span></a>
        </div>
      </header>

      <div class="page">
        <div class="sec-head">
          <div>
            <div class="sec-title">Mi perfil</div>
            <div class="sec-sub">Estadisticas y configuracion</div>
          </div>
        </div>

        <div class="prof-card">
          <div class="prof-cover" id="prof-cover" onclick="document.getElementById('banner-file').click()">
            <img id="prof-banner-img" class="prof-cover-img" src="" alt="" style="display:none">
            <div class="prof-cover-ov">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                <circle cx="12" cy="13" r="4" />
              </svg>
              Cambiar banner
            </div>
            <input type="file" id="banner-file" accept="image/*" style="display:none" onchange="handleBanner(event)">
          </div>
          <div class="prof-ava-row">
            <div class="prof-ava" id="prof-ava" onclick="document.getElementById('ava-file').click()"><span
                id="prof-ini">?</span></div>
            <input type="file" id="ava-file" accept="image/*" style="display:none" onchange="handleAva(event)">
          </div>
          <div class="prof-body">
            <div class="prof-name" id="prof-name-d">Usuario</div>
            <div class="prof-rank-badge">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon
                  points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" />
              </svg>
              <span id="prof-rank-label">Recien llegado</span>
            </div>
            <div class="prof-bio" id="prof-bio-d">Sin biografia aun.</div>
            <div class="rank-bar-bg">
              <div class="rank-bar-fill" id="prof-rank-fill" style="width:0%"></div>
            </div>
            <div class="rank-next-label" id="prof-rank-next"></div>
          </div>
        </div>

        <div class="sec-head" style="margin-bottom:10px">
          <div class="sec-title" style="font-size:16px">Estadisticas</div>
        </div>
        <div class="stats-grid">
          <div class="stat-c">
            <div class="stat-v" id="st-eps">0</div>
            <div class="stat-l">Episodios vistos</div>
          </div>
          <div class="stat-c">
            <div class="stat-v" id="st-favs">0</div>
            <div class="stat-l">Favoritos</div>
          </div>
          <div class="stat-c">
            <div class="stat-v" id="st-anim">0</div>
            <div class="stat-l">Animes visitados</div>
          </div>
          <div class="stat-c">
            <div class="stat-v" id="st-days">0</div>
            <div class="stat-l">Dias activo</div>
          </div>
        </div>

        <div class="sec-head" style="margin-bottom:10px">
          <div class="sec-title" style="font-size:16px">Editar perfil</div>
        </div>
        <div class="edit-card">
          <div class="f-row">
            <div class="f-group"><label class="f-label">Nombre de usuario</label><input class="f-in" id="in-uname"
                placeholder="Username"></div>
            <div class="f-group"><label class="f-label">Rango</label><input class="f-in" id="in-role-display" readonly
                style="cursor:not-allowed;opacity:.55" placeholder="Se actualiza automaticamente"></div>
          </div>
          <div class="f-group"><label class="f-label">Biografia</label><textarea class="f-in f-ta" id="in-bio"
              placeholder="Cuentanos de ti..."></textarea></div>
          <button class="btn btn-primary" onclick="saveProf()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
              <polyline points="17,21 17,13 7,13 7,21" />
              <polyline points="7,3 7,8 15,8" />
            </svg>
            Guardar
          </button>
        </div>
      </div>
    </main>
  </div>
  <div class="toast-box" id="toast-box"></div>

  <script src="common.js"></script>
  <script>
    function loadProf() {
      const p = S.prof, r = computeRank();
      document.getElementById('prof-name-d').textContent = p.uname || 'Usuario';
      document.getElementById('prof-bio-d').textContent = p.bio || 'Sin biografia aun.';
      document.getElementById('prof-rank-label').textContent = r.rank.label;
      document.getElementById('prof-rank-next').textContent = r.nextLabel;
      document.getElementById('prof-rank-fill').style.width = r.progress + '%';
      document.getElementById('in-role-display').value = r.rank.label;
      document.getElementById('in-uname').value = p.uname || '';
      document.getElementById('in-bio').value = p.bio || '';

      const ini = (p.uname || 'U').charAt(0).toUpperCase();
      const pAva = document.getElementById('prof-ava');
      pAva.innerHTML = p.ava ? '<img src="' + p.ava + '" alt="">' : '<span>' + ini + '</span>';

      const bimg = document.getElementById('prof-banner-img');
      if (p.banner) { bimg.src = p.banner; bimg.style.display = 'block'; } else { bimg.style.display = 'none'; }

      renderStats();
      renderAva(); // refresh sidebar/topbar too
    }
    function renderStats() {
      const eps = Object.keys(S.watched).length, favs = Object.keys(S.favs).length;
      const anims = new Set(Object.values(S.watched).map(w => w.slug)).size;
      const first = S.hist.length ? new Date(S.hist[S.hist.length - 1].ts) : null;
      const days = first ? Math.max(1, Math.ceil((Date.now() - first) / 86400000)) : 0;
      document.getElementById('st-eps').textContent = eps;
      document.getElementById('st-favs').textContent = favs;
      document.getElementById('st-anim').textContent = anims;
      document.getElementById('st-days').textContent = days;
    }
    function saveProf() {
      S.prof.uname = (document.getElementById('in-uname').value || '').trim();
      S.prof.bio = (document.getElementById('in-bio').value || '').trim();
      persist(); loadProf(); toast('Perfil guardado', 'ok');
    }
    function handleAva(e) {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => { S.prof.ava = ev.target.result; persist(); loadProf(); toast('Foto actualizada', 'ok') };
      r.readAsDataURL(f);
    }
    function handleBanner(e) {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => { S.prof.banner = ev.target.result; persist(); loadProf(); toast('Banner actualizado', 'ok') };
      r.readAsDataURL(f);
    }
    loadProf();
  </script>

</body>

</html>

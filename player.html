<script src="common.js"></script>
<script>
const qs=new URLSearchParams(location.search);
const epUrlParam=qs.get('ep');
const slugParam=qs.get('slug');
const numParam=parseInt(qs.get('num')||'0',10);

async function loadPlayer(){
  const body=document.getElementById('play-body');
  let epUrl=epUrlParam,animeSlug=slugParam,animeTitle=qs.get('title')||'',coverImg=qs.get('cover')||'',number=numParam;
  if(!animeSlug&&epUrl)animeSlug=animeSlugFromEpisodeUrl(epUrl);
  /* Prefer the canonical /anime/tioanime/episode/{slug}-{num} form whenever we
     have slug+num: some listings (e.g. last/episodes) hand back inconsistent
     episode urls that resolve to 0 servers, while this canonical form always works. */
  if(animeSlug&&number)epUrl='/anime/tioanime/episode/'+animeSlug+'-'+number;
  if(!epUrl){body.innerHTML='<div style="color:var(--text3);padding:40px 0;text-align:center">Episodio no especificado.</div>';return;}

  const [servers,animeData]=await Promise.all([req(epUrl),req('/anime/tioanime/name/'+animeSlug)]);
  if(animeData){
    if(!animeTitle)animeTitle=animeData.name;
    if(!coverImg)coverImg=(animeData.image&&animeData.image.url)||'';
  }
  const eps=animeData&&Array.isArray(animeData.episodes)?animeData.episodes.slice().reverse():[];
  if(!number&&eps.length){const m=epUrl.match(/-(\d+)$/);if(m)number=parseInt(m[1],10);}
  markWatched(animeSlug,animeTitle,number,coverImg);
  if(animeTitle)setMeta('Episodio '+number+' · '+animeTitle+' · AnimeStream','Mira '+animeTitle+' - Episodio '+number+' online gratis y sin anuncios en AnimeStream.');
  const sorted=Array.isArray(servers)?sortServers(servers):[];
  const idx=eps.findIndex(e=>e.num===number),prev=idx>0?eps[idx-1]:null,next=(idx>=0&&idx<eps.length-1)?eps[idx+1]:null;
  const cvSafe=safeStr(coverImg);
  const srvBtns=sorted.map((s,i)=>'<button class="srv-btn'+(i===0?' on':'')+'" id="srv'+i+'" onclick="switchSrv('+i+')">'+(s.name||'Servidor '+(i+1))+'</button>').join('');
  const dlLinks=sorted.filter(s=>s.file_url).map(s=>'<a href="'+s.file_url+'" target="_blank" rel="noopener" class="dl-link">Descargar ('+s.name+')</a>').join('');
  const prevBtn=prev?'<a class="btn btn-ghost btn-sm" href="'+playerLink(prev.url,prev.num)+'">Anterior</a>':'';
  const nextBtn=next?'<a class="btn btn-primary btn-sm" href="'+playerLink(next.url,next.num)+'">Siguiente</a>':'';
  let epListHtml='';
  if(eps.length)epListHtml='<div style="margin-top:22px"><div class="sec-head"><div class="sec-title" style="font-size:16px">Lista de episodios</div></div><div class="ep-list">'+eps.slice(0,60).map(ep=>{const w=isWatched(animeSlug,ep.num),cur=ep.num===number;return'<a class="el-item'+(w?' watched':'')+(cur?' current':'')+'" href="'+playerLink(ep.url,ep.num)+'"><div class="el-num">'+ep.num+'</div><div class="el-meta"><div class="el-ltitle">Episodio '+ep.num+'</div><div class="el-lsub">'+(cur?'Reproduciendo':w?'Visto':'Sin ver')+'</div></div></a>';}).join('')+'</div></div>';
  body.innerHTML=
    '<a class="back-btn" href="'+detailLink(animeSlug)+'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>'+(animeTitle?(animeTitle.length>28?animeTitle.slice(0,25)+'...':animeTitle):'Volver al anime')+'</a>'+
    '<div class="player-wrap"><div class="player-top"><div><div class="player-t">'+(animeTitle||'Episodio')+'</div><div class="player-sub">Episodio '+number+' &middot; '+sorted.length+' servidor'+(sorted.length!==1?'es':'')+'</div></div>'+
    '<button class="btn btn-secondary btn-sm" onclick="toggleFav(\''+animeSlug+'\',\''+safeStr(animeTitle)+'\',\''+cvSafe+'\',event)">'+(S.favs[animeSlug]?'En favoritos':'Guardar anime')+'</button></div>'+
    '<div class="player-screen" id="pscreen">'+buildIframe(sorted[0])+'</div>'+
    '<div class="player-foot"><span class="srv-label">Servidor:</span>'+srvBtns+dlLinks+'<div class="pnav">'+prevBtn+nextBtn+'</div></div></div>'+epListHtml;
  window.__srvs=sorted;
  window.switchSrv=function(i){
    document.querySelectorAll('.srv-btn').forEach((b,j)=>b.classList.toggle('on',i===j));
    document.getElementById('pscreen').innerHTML=buildIframe(window.__srvs[i]);
  };
}
loadPlayer();
</script>

</div>
<div class="toast-box" id="toast-box"></div>

<script src="common.js"></script>
<script>
function onFavToggled(){loadFavs();}
function loadFavs(){
  const items=Object.values(S.favs);
  document.getElementById('fav-sub').textContent=items.length+' anime'+(items.length!==1?'s':'')+' guardado'+(items.length!==1?'s':'');
  const body=document.getElementById('fav-body');
  if(!items.length){body.innerHTML='<div class="fav-empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg><h3>Sin favoritos aun</h3><p>Explora y guarda los animes que te gusten.</p><a class="btn btn-primary" style="margin-top:14px" href="explore.html">Explorar animes</a></div>';return;}
  body.innerHTML='<div class="anime-grid">'+items.map(a=>{
    return'<a class="ac" href="'+detailLink(a.slug)+'">'+mkImg(a.cover,'ac-poster',a.title)+
      '<button class="fav-pin on" data-slug="'+a.slug+'" onclick="toggleFav(\''+a.slug+'\',\''+safeStr(a.title)+'\',\''+safeStr(a.cover)+'\',event)">'+favSvg(true)+'</button>'+
      '<div class="ac-body"><div class="ac-title">'+(a.title||'Sin titulo')+'</div>'+
      '<div class="ac-meta" style="font-size:10px">'+(a.addedAt?new Date(a.addedAt).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}):'')+'</div></div></a>';
  }).join('')+'</div>';
}
loadFavs();
</script>

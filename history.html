<script src="common.js"></script>
<script>
function loadHist(){
  const body=document.getElementById('hist-body');
  if(!S.hist.length){body.innerHTML='<div class="fav-empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg><h3>Sin historial aun</h3><p>Los episodios que veas apareceran aqui.</p></div>';return;}
  const groups={};
  S.hist.forEach(e=>{const key=new Date(e.ts).toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});if(!groups[key])groups[key]=[];groups[key].push(e)});
  const actionBtn='<div class="hist-actions"><button class="btn btn-secondary btn-sm" onclick="clearAllHistory()" style="background:rgba(255,82,82,.1);border-color:rgba(255,82,82,.3);color:var(--red)">Borrar todo</button></div>';
  body.innerHTML=actionBtn+Object.entries(groups).slice(0,12).map(([date,entries])=>
    '<div class="hist-group"><div class="hist-date">'+date+'</div>'+
    entries.map(e=>{
      return'<div class="hist-item">'+
        '<a class="hist-item-content" href="player.html?slug='+encodeURIComponent(e.slug)+'&num='+e.number+'&title='+encodeURIComponent(e.title||'')+'&cover='+encodeURIComponent(e.cover||'')+'">'+
        mkImg(e.cover,'hist-thumb',e.title)+
        '<div class="hist-info"><div class="hist-title">'+(e.title||'Sin titulo')+'</div>'+
        '<div class="hist-sub">Episodio '+e.number+' &middot; '+new Date(e.ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})+'</div></div></a>'+
        '<button class="hist-del" onclick="delHist(\''+e.slug+'\','+e.number+',event)">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
    }).join('')+'</div>').join('');
}
function delHist(slug,num,ev){
  if(ev)ev.stopPropagation();
  const i=S.hist.findIndex(e=>e.slug===slug&&e.number===num);
  if(i!==-1){S.hist.splice(i,1);persist();toast('Episodio eliminado del historial','ok');loadHist();}
}
function clearAllHistory(){
  if(confirm('Borrar todo el historial?')){S.hist=[];persist();toast('Historial borrado','ok');loadHist();}
}
loadHist();
</script>

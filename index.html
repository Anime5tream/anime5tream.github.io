</div>

<script src="common.js"></script>
<script>
let heroItems=[],heroIdx=0,heroTimer=null;

function heroImg(a){
  const img=a.image;
  let url='';
  if(typeof img==='string')url=img;
  else if(img&&typeof img==='object')url=img.banner||img.url||'';
  if(!url&&a.thumbnail)url=(typeof a.thumbnail==='string')?a.thumbnail:(a.thumbnail.url||'');
  if(!url&&a.poster)url=a.poster;
  if(!url&&a.cover)url=a.cover;
  return url;
}

function renderHero(){
  if(!heroItems.length)return;
  document.getElementById('hero-dots').innerHTML=heroItems.map((_,i)=>'<div class="h-dot'+(i===0?' active':'')+'" onclick="setHero('+i+')"></div>').join('');
  setHero(0);
  if(heroTimer)clearInterval(heroTimer);
  heroTimer=setInterval(()=>setHero((heroIdx+1)%heroItems.length),5200);
}
function setHero(i){
  heroIdx=i;const a=heroItems[i];
  document.querySelectorAll('.h-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  const bgEl=document.getElementById('hero-bg');const hUrl=proxyImg(heroImg(a));if(bgEl)bgEl.style.backgroundImage=hUrl?"url('"+hUrl+"')":'none';
  const slug=slugFromUrl(a.url),isEp=a.num!==undefined;
  const body=document.getElementById('hero-body');if(!body)return;
  const animeSlug=isEp?animeSlugFromEpisodeUrl(a.url):slug;
  body.innerHTML=(isEp?'<div class="hero-ep-badge">'+playSvg(12)+' Episodio '+a.num+'</div>':'')+
    '<div class="hero-title">'+(a.name||'Sin titulo')+'</div>'+
    '<div class="hero-syn">'+(a.synopsis||'Haz clic para ver los detalles de este anime.')+'</div>'+
    '<div class="hero-acts">'+(isEp?'<a class="btn btn-primary" href="player.html?slug='+encodeURIComponent(animeSlug)+'&num='+a.num+'">'+playSvg(13)+' Ver ahora</a>':'')+
    '<a class="btn btn-secondary" href="'+detailLink(animeSlug)+'">Ver anime</a></div>';
}
function renderLatest(data){
  const el=document.getElementById('latest-grid');
  if(!Array.isArray(data)||!data.length){el.innerHTML='<div style="color:var(--text3);font-size:13px;grid-column:1/-1;padding:20px 0">No se pudo cargar episodios.</div>';return;}
  el.innerHTML=data.slice(0,20).map(ep=>{
    const animeSlug=animeSlugFromEpisodeUrl(ep.url),imgUrl=(ep.thumbnail&&ep.thumbnail.url)||'',w=isWatched(animeSlug,ep.num);
    return'<a class="lep-card" href="player.html?slug='+encodeURIComponent(animeSlug)+'&num='+(ep.num||0)+'">'+
      '<div class="lep-thumb-wrap">'+mkImg(imgUrl,'lep-thumb',ep.name)+
      '<div class="lep-play-ov"><div class="lep-play-circle">'+playSvg(20)+'</div></div>'+
      (w?'<div class="lep-watched-bar"></div>':'')+
      '<div class="lep-ep-num">EP '+(ep.num||'?')+'</div></div>'+
      '<div class="lep-body"><div class="lep-title">'+(ep.name||'Sin titulo')+'</div>'+
      '<div class="lep-meta-row"><div class="lep-enum">Episodio '+(ep.num||'?')+'</div>'+(w?'<div class="lep-watched-dot"></div>':'')+'</div></div></a>';
  }).join('');
}
async function loadHome(){
  const [latest,animes]=await Promise.all([req('/anime/tioanime/last/episodes'),req('/anime/tioanime/last/animes')]);
  renderLatest(latest);
  // El endpoint /last/animes no siempre trae "image" con el shape esperado (por eso el hero salia vacio).
  // /last/episodes SI trae thumbnail.url de forma consistente (confirmado: las portadas de la grilla cargan bien),
  // asi que el hero usa esa fuente primero.
  const src=(Array.isArray(latest)&&latest.length)?latest:animes;
  if(Array.isArray(src)&&src.length){
    const seen=new Set(),uniq=[];
    for(const item of src){const key=item.num!==undefined?animeSlugFromEpisodeUrl(item.url):slugFromUrl(item.url);if(seen.has(key))continue;seen.add(key);uniq.push(item);if(uniq.length===5)break;}
    heroItems=uniq.length?uniq:src.slice(0,5);
    renderHero();
  }
}
loadHome();
</script>

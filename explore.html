      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="exp-search-input" type="text" placeholder="Buscar anime por nombre..." autocomplete="off">
    </div>
    <div class="filter-row" id="genre-row"></div>
    <div class="fbar">
      <select class="fsel" id="f-type" onchange="loadExplore()">
        <option value="">Todos los tipos</option>
        <option value="0">TV</option><option value="1">Pelicula</option><option value="2">OVA</option><option value="3">Especial</option>
      </select>
      <select class="fsel" id="f-status" onchange="loadExplore()">
        <option value="">Cualquier estado</option>
        <option value="1">En emision</option><option value="2">Finalizado</option><option value="3">Proximamente</option>
      </select>
      <select class="fsel" id="f-sort" onchange="loadExplore()">
        <option value="">Orden por defecto</option>
        <option value="recent">Mas recientes</option><option value="-recent">Mas antiguos</option>
      </select>
    </div>
    <div class="anime-grid" id="explore-grid"><div class="load" style="grid-column:1/-1"><div class="spin"></div></div></div>

  </div>

</div>
<div class="toast-box" id="toast-box"></div>

<script src="common.js"></script>
<script>
let exploreQuery='',exploreGenre='',expSearchTimer=null;

function buildGenreChips(){
  const row=document.getElementById('genre-row');
  row.innerHTML='<span class="fchip on" onclick="setGenre(this,\'\')">Todos</span>'+
    GENRES.map(g=>'<span class="fchip" onclick="setGenre(this,\''+g+'\')">'+g.replace(/-/g,' ')+'</span>').join('');
}
function setGenre(el,g){document.querySelectorAll('#genre-row .fchip').forEach(c=>c.classList.remove('on'));el.classList.add('on');exploreGenre=g;loadExplore();}
async function loadExplore(){
  const grid=document.getElementById('explore-grid');
  grid.innerHTML='<div class="load" style="grid-column:1/-1"><div class="spin"></div></div>';
  const qp=new URLSearchParams();
  if(exploreQuery.trim())qp.set('title',exploreQuery.trim());
  if(exploreGenre)qp.append('gen[]',exploreGenre);
  const type=document.getElementById('f-type').value,status=document.getElementById('f-status').value,sort=document.getElementById('f-sort').value;
  if(type!=='')qp.set('type',type);
  if(status!=='')qp.set('status',status);
  if(sort)qp.set('sort',sort);
  const d=await req('/anime/tioanime/filter?'+qp.toString());
  const items=(d&&Array.isArray(d.results))?d.results:[];
  document.getElementById('exp-sub').textContent=items.length+' resultados';
  if(!items.length){grid.innerHTML='<div style="color:var(--text3);font-size:13px;grid-column:1/-1;padding:20px 0">Sin resultados.</div>';return;}
  grid.innerHTML=items.slice(0,40).map(a=>animeCard(a)).join('');
}
document.getElementById('exp-search-input').addEventListener('input',function(){
  clearTimeout(expSearchTimer);exploreQuery=this.value;expSearchTimer=setTimeout(()=>loadExplore(),420);
});
buildGenreChips();
loadExplore();
</script>

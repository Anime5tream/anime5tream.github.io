<script src="common.js"></script>
<script>
let exploreQuery='',exploreGenre='',expSearchTimer=null,exploreItems=[],explorePage=0;

function stableHue(str){let h=0;for(let i=0;i<str.length;i++)h=(h*31+str.charCodeAt(i))>>>0;return h%360}
function buildGenreChips(){
  const row=document.getElementById('genre-row');
  const validGenres = ['accion','aventura','ciencia-ficcion','comedia','demonios','drama','ecchi','fantasia','harem','historico','magia','mecha','misterio','musica','psicologico','romance','samurai','seinen','shoujo','shounen','sobrenatural','suspenso','terror'];
  row.innerHTML='<span class="fchip on" onclick="setGenre(this,\'\')">Todos</span>'+
    validGenres.map(g=>'<span class="fchip" style="--h:'+stableHue(g)+'" onclick="setGenre(this,\''+g+'\')"><span class="fdot"></span>'+g.replace(/-/g,' ')+'</span>').join('');
}
function setGenre(el,g){document.querySelectorAll('#genre-row .fchip').forEach(c=>c.classList.remove('on'));el.classList.add('on');exploreGenre=g;loadExplore();}

function idleState(){
  return'<div class="fav-empty" style="grid-column:1/-1"><svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><h3>Busca un anime para empezar</h3><p>O elegi una categoria o filtro arriba.</p></div>';
}

async function loadExplore(){
  const grid=document.getElementById('explore-grid'),sub=document.getElementById('exp-sub');
  const q=exploreQuery.trim();
  const typeValue = document.getElementById('f-type').value;
  const statusValue = document.getElementById('f-status').value;
  
  const type = typeValue ? parseInt(typeValue) : null;
  const status = statusValue ? parseInt(statusValue) : null;

  if(!q && !exploreGenre && type === null && status === null){
    grid.innerHTML=idleState();
    sub.textContent='Busca por nombre o filtra por genero';
    return;
  }

  grid.innerHTML='<div class="load" style="grid-column:1/-1"><div class="spin"></div></div>';

  let items = [];

  if(q){
    const searchQuery = q.replace(/[:;]/g, ' ').replace(/\s+/g, ' ').trim();
    let url = '/anime/tioanime/filter?title=' + encodeURIComponent(searchQuery);
    
    if(exploreGenre){
      url += '&gen%5B%5D=' + encodeURIComponent(exploreGenre);
    }
    if(type !== null){
      url += '&type=' + type;
    }
    if(status !== null){
      url += '&status=' + status;
    }
    
    const d = await req(url);
    items = (d && Array.isArray(d.results)) ? d.results : [];
    
    if (items.length === 0 && q !== searchQuery) {
      const fallbackQuery = q.replace(/[^a-zA-Z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
      if (fallbackQuery !== searchQuery) {
        let fallbackUrl = '/anime/tioanime/filter?title=' + encodeURIComponent(fallbackQuery);
        if(exploreGenre){
          fallbackUrl += '&gen%5B%5D=' + encodeURIComponent(exploreGenre);
        }
        if(type !== null){
          fallbackUrl += '&type=' + type;
        }
        if(status !== null){
          fallbackUrl += '&status=' + status;
        }
        const d2 = await req(fallbackUrl);
        items = (d2 && Array.isArray(d2.results)) ? d2.results : [];
      }
    }
    
    if (items.length > 0) {
      items = items.filter(a => matchesQuery(a.name, q));
    }
  } else {
    let url = '/anime/tioanime/filter';
    let params = [];
    
    if(exploreGenre){
      params.push('gen%5B%5D=' + encodeURIComponent(exploreGenre));
    }
    if(type !== null){
      params.push('type=' + type);
    }
    if(status !== null){
      params.push('status=' + status);
    }
    
    if(params.length > 0){
      url += '?' + params.join('&');
      const d = await req(url);
      items = (d && Array.isArray(d.results)) ? d.results : [];
    } else {
      const pool = await getCatalogPool();
      items = pool ? pool.slice() : [];
    }
  }

  sub.textContent = items.length + ' resultados';
  
  if(!items.length){
    grid.innerHTML='<div style="color:var(--text3);font-size:13px;grid-column:1/-1;padding:20px 0">Sin resultados.</div>';
    return;
  }

  exploreItems = items;
  explorePage = 0;
  renderExplorePage();
}

const EXP_PAGE_SIZE = 24;
function renderExplorePage(){
  const grid=document.getElementById('explore-grid'),sub=document.getElementById('exp-sub');
  const total=exploreItems.length;
  const totalPages=Math.max(1,Math.ceil(total/EXP_PAGE_SIZE));
  explorePage=Math.min(Math.max(0,explorePage),totalPages-1);
  sub.textContent=total+' resultados'+(totalPages>1?' · pagina '+(explorePage+1)+' de '+totalPages:'');

  const slice=exploreItems.slice(explorePage*EXP_PAGE_SIZE,(explorePage+1)*EXP_PAGE_SIZE);
  const cardsHtml=slice.map(a => {
    const slug = slugFromUrl(a.url);
    const name = a.name || 'Sin titulo';
    const imgUrl = (a.image && a.image.url) || a.image || '';
    const typeStr = a.type ? typeLabel(a.type) : '';

    return '<a class="ac" href="' + detailLink(slug) + '">' +
      posterBlock(imgUrl, name, slug, a.type) +
      '<div class="ac-body"><div class="ac-title">' + name + '</div><div class="ac-meta">' + (typeStr || '') + '</div></div></a>';
  }).join('');

  grid.innerHTML = '<div class="anime-grid">'+cardsHtml+'</div>' + buildPager(totalPages);
}

function buildPager(totalPages){
  if(totalPages<=1)return'';
  const cur=explorePage;
  const btn=(p,label,disabled,active)=>'<button class="pg-btn'+(active?' on':'')+'" '+(disabled?'disabled':'onclick="goExplorePage('+p+')"')+'>'+label+'</button>';
  let nums='';
  const start=Math.max(0,Math.min(cur-2,totalPages-5)),end=Math.min(totalPages,start+5);
  for(let p=Math.max(0,start);p<end;p++)nums+=btn(p,p+1,false,p===cur);
  return '<div class="pager">'+
    btn(cur-1,'Anterior',cur===0)+
    nums+
    btn(cur+1,'Siguiente',cur>=totalPages-1)+
    '</div>';
}
function goExplorePage(p){explorePage=p;renderExplorePage();window.scrollTo({top:document.querySelector('.page').offsetTop,behavior:'smooth'});}

document.getElementById('exp-search-input').addEventListener('input',function(){
  clearTimeout(expSearchTimer);exploreQuery=this.value;expSearchTimer=setTimeout(()=>loadExplore(),300);
});
buildGenreChips();
loadExplore();
</script>

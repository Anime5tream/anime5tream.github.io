</div>

<script src="common.js"></script>
<script>
const qs=new URLSearchParams(location.search);
const slug=qs.get('slug')||'';

async function loadDetail(){
  const body=document.getElementById('det-body');
  if(!slug){body.innerHTML='<div style="color:var(--text3);padding:40px 0;text-align:center">Anime no especificado.</div>';return;}
  const data=await req('/anime/tioanime/name/'+slug);
  if(!data){body.innerHTML='<div style="color:var(--text3);padding:40px 0;text-align:center">No se pudo cargar el anime.</div>';return;}
  if(data.name)setMeta(data.name+' · AnimeStream',data.synopsis||('Mira '+data.name+' online gratis y sin anuncios en AnimeStream.'));
  const on=!!S.favs[slug],cv=(data.image&&(data.image.url))||'',banner=(data.image&&data.image.banner)||cv,cvSafe=safeStr(cv);
  const eps=Array.isArray(data.episodes)?data.episodes:[];
  let statusLabel=null,statusClass='b-gray';
  if(typeof data.status==='boolean'){statusLabel=data.status?'Finalizado':'En emision';statusClass=data.status?'b-gray':'b-green';}
  else if(typeof data.status==='string'&&data.status){statusLabel=data.status;statusClass=/emision/i.test(data.status)?'b-green':/final/i.test(data.status)?'b-gray':'b-amber';}
  const year=data.date&&data.date.begin&&data.date.begin.year;
  const infoRows=[['Estado',statusLabel],['Tipo',typeLabel(data.type)],['Anio',year],['Estacion',data.station],['Total episodios',eps.length?eps.length+' episodios':null]].filter(r=>r[1]).map(r=>'<div class="info-cell"><div class="info-k">'+r[0]+'</div><div class="info-v">'+r[1]+'</div></div>').join('');
  let relBlock='';
  const chron=Array.isArray(data.chronology)?data.chronology:(data.chronology?[data.chronology]:[]);
  if(chron.length)relBlock='<div class="tc" id="tc-rel"><div class="anime-grid">'+chron.map(r=>{const rslug=slugFromUrl(r.url);return'<a class="ac" href="'+detailLink(rslug)+'">'+mkImg(r.image,'ac-poster',r.name)+'<div class="ac-body"><div class="ac-title">'+(r.name||'Sin titulo')+'</div></div></a>';}).join('')+'</div></div>';
  body.innerHTML=
    '<button class="back-btn" onclick="history.back()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>Volver</button>'+
    '<div class="det-hero"><div class="det-hero-bg" style="background-image:url(\''+proxyImg(banner)+'\')"></div><div class="det-hero-grad"></div>'+
    '<div class="det-hero-body">'+mkImg(cv,'det-poster',data.name)+
    '<div class="det-info"><div class="det-title">'+(data.name||'Sin titulo')+'</div>'+
    '<div class="det-badges">'+(statusLabel?'<span class="badge '+statusClass+'">'+statusLabel+'</span>':'')+(typeLabel(data.type)?'<span class="badge b-accent">'+typeLabel(data.type).toUpperCase()+'</span>':'')+(data.genres||[]).slice(0,4).map(g=>'<span class="badge b-gray">'+g+'</span>').join('')+'</div>'+
    '<div class="det-syn">'+(data.synopsis||'Sin sinopsis disponible.')+'</div>'+
    '<div class="det-acts">'+(eps.length?'<a class="btn btn-primary" href="'+playerLink(eps[eps.length-1].url,eps[eps.length-1].num)+'">'+playSvg(13)+' Ver episodio '+eps[eps.length-1].num+'</a>':'')+
    '<button class="btn btn-secondary" id="det-fav-btn" onclick="toggleFav(\''+slug+'\',\''+safeStr(data.name)+'\',\''+cvSafe+'\',event)">'+(on?'En favoritos':'Agregar a favoritos')+'</button></div></div></div></div>'+
    '<div class="tabs"><div class="tab on" onclick="switchTab(this,\'ep\')">Episodios ('+eps.length+')</div><div class="tab" onclick="switchTab(this,\'info\')">Informacion</div>'+(chron.length?'<div class="tab" onclick="switchTab(this,\'rel\')">Relacionados</div>':'')+'</div>'+
    '<div class="tc on" id="tc-ep"><div id="ep-container"></div></div>'+
    '<div class="tc" id="tc-info"><div class="info-grid">'+infoRows+'</div>'+
    (data.genres&&data.genres.length?'<div><div style="font-size:11px;color:var(--text3);margin-bottom:6px">Generos</div>'+data.genres.map(g=>'<span class="genre-tag">'+g+'</span>').join('')+'</div>':'')+'</div>'+relBlock;

  window.onFavToggled=function(s){if(s===slug){const btn=document.getElementById('det-fav-btn');if(btn)btn.textContent=S.favs[slug]?'En favoritos':'Agregar a favoritos';}};

  const EPPAGE=10;let epPage=0;
  const epsAsc=eps.slice().reverse();
  function renderEpPage(){
    const container=document.getElementById('ep-container');if(!container)return;
    const slice=epsAsc.slice(epPage*EPPAGE,(epPage+1)*EPPAGE);
    if(!slice.length)return;
    let grid=container.querySelector('.episodes-grid');
    if(!grid){grid=document.createElement('div');grid.className='episodes-grid';container.appendChild(grid);}
    grid.insertAdjacentHTML('beforeend',slice.map(ep=>{
      const w=isWatched(slug,ep.num),thumb=(ep.thumbnail&&ep.thumbnail.url)||cv;
      return'<a class="lep-card" href="'+playerLink(ep.url,ep.num)+'">'+
        '<div class="lep-thumb-wrap">'+mkImg(thumb,'lep-thumb','Episodio '+ep.num)+
        '<div class="lep-play-ov"><div class="lep-play-circle">'+playSvg(20)+'</div></div>'+
        (w?'<div class="lep-watched-bar"></div>':'')+
        '<div class="lep-ep-num">EP '+ep.num+'</div></div>'+
        '<div class="lep-body"><div class="lep-title">Episodio '+ep.num+'</div>'+
        '<div class="lep-meta-row"><div class="lep-enum">'+(ep.name||'Episodio '+ep.num)+'</div>'+(w?'<div class="lep-watched-dot"></div>':'')+'</div></div></a>';
    }).join(''));
    const old=container.querySelector('.ep-loadmore');if(old)old.remove();
    const remaining=epsAsc.length-(epPage+1)*EPPAGE;
    if(remaining>0){
      const d=document.createElement('div');d.className='ep-loadmore';
      d.innerHTML='<button class="ep-loadmore-btn" onclick="window._loadMoreEps()">Cargar mas episodios ('+remaining+' restantes)</button>';
      container.appendChild(d);
    }
    epPage++;
  }
  window._loadMoreEps=function(){renderEpPage();};
  if(epsAsc.length)renderEpPage();
  else document.getElementById('ep-container').innerHTML='<div style="color:var(--text3);font-size:13px;padding:14px 0">Sin episodios disponibles.</div>';
}
function switchTab(el,id){el.closest('.page').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.closest('.page').querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));el.classList.add('on');const tc=document.getElementById('tc-'+id);if(tc)tc.classList.add('on')}
loadDetail();
</script>

</body>
</html>
